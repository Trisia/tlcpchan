name: Release 发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如: v1.0.1）'
        required: true
        type: string

env:
  DOCKER_REGISTRY: docker.io
  GHCR_REGISTRY: ghcr.io
  DOCKER_REPOSITORY: cliven/tlcpchan
  GHCR_REPOSITORY: trisia/tlcpchan

jobs:
  build:
    name: 跨平台编译和打包
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装 nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.0
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: 安装前端依赖
        working-directory: ./tlcpchan-ui
        run: npm ci

      - name: 构建前端
        working-directory: ./tlcpchan-ui
        run: npm run build

      - name: 编译所有平台
        run: |
          ./release/scripts/build.sh

      - name: 构建 DEB 包
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./release/scripts/linux/deb/package.sh

      - name: 构建 RPM 包
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./release/scripts/linux/rpm/package.sh

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          retention-days: 30

  windows-build:
    name: Windows MSI 打包
    runs-on: Windows-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 安装前端依赖
        working-directory: ./tlcpchan-ui
        run: npm ci

      - name: 构建前端
        working-directory: ./tlcpchan-ui
        run: npm run build

      - name: 构建并打包 MSI
        run: ./release/scripts/windows/package.ps1

      - name: 上传 MSI 包
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi
          retention-days: 30

  docker-build-multiarch:
    name: Docker 多架构构建和推送（amd64/arm64）
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${{ needs.build.outputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 设置 QEMU（多架构支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:${{ steps.get_version.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.get_version.outputs.version }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/Trisia/tlcpchan
            org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  docker-build-loong64:
    name: Docker loong64 架构构建和推送
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${{ needs.build.outputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 构建并推送 loong64 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.loong64
          platforms: linux/loong64
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:${{ steps.get_version.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:${{ steps.get_version.outputs.version }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/Trisia/tlcpchan
            org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.architecture=loong64

  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker-build-multiarch, docker-build-loong64, windows-build]
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: 下载 MSI 包
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/

      - name: 获取版本号
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${{ needs.build.outputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 生成 Release 说明
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🎉 TLCP Channel ${{ steps.get_version.outputs.version }} 发布
          
          ### 📦 安装包
          
          #### 压缩包
          - Linux amd64: `tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.tar.gz`
          - Linux arm64: `tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.tar.gz`
          - Linux loong64: `tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.tar.gz`
          - macOS amd64: `tlcpchan_${{ steps.get_version.outputs.version }}_darwin_amd64.tar.gz`
          - macOS arm64: `tlcpchan_${{ steps.get_version.outputs.version }}_darwin_arm64.tar.gz`
          - Windows amd64: `tlcpchan_${{ steps.get_version.outputs.version }}.0_windows_amd64.zip`
          
          #### 系统包
          - Debian/Ubuntu (amd64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.deb`
          - Debian/Ubuntu (arm64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.deb`
          - Debian/Ubuntu (loong64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.deb`
          - RHEL/CentOS (amd64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.rpm`
          - RHEL/CentOS (arm64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.rpm`
          - RHEL/CentOS (loong64): `tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.rpm`
          - Windows Installer (amd64): `tlcpchan_${{ steps.get_version.outputs.version }}.0_windows_amd64.msi`
          
          ### 🐳 Docker 镜像
          
          #### Docker Hub
          ```bash
          docker pull cliven/tlcpchan:${{ steps.get_version.outputs.version }}
          docker pull cliven/tlcpchan:latest
          ```
          
          #### GitHub Container Registry
          ```bash
          docker pull ghcr.io/trisia/tlcpchan:${{ steps.get_version.outputs.version }}
          docker pull ghcr.io/trisia/tlcpchan:latest
          ```
          
          ### 📖 安装指南
          
          详细安装文档请参阅：[release/README.md](https://github.com/Trisia/tlcpchan/blob/main/release/README.md)
          
          ### 🔗 相关链接
          
          - [更新日志](https://github.com/Trisia/tlcpchan/commits/v${{ steps.get_version.outputs.version }})
          - [项目主页](https://github.com/Trisia/tlcpchan)
          
          ---
          
          **感谢使用 TLCP Channel！**
          EOF
          cat release_notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.tar.gz
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.tar.gz
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.tar.gz
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_darwin_amd64.tar.gz
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_darwin_arm64.tar.gz
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_windows_amd64.zip
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.deb
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.deb
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.deb
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_amd64.rpm
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_arm64.rpm
            dist/tlcpchan_${{ steps.get_version.outputs.version }}_linux_loong64.rpm
            dist/tlcpchan_${{ steps.get_version.outputs.version }}.0_windows_amd64.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
